function logo(sz='md'){
  const cfg={sm:[26,15],md:[34,20],lg:[46,26]};
  const [h,fs]=cfg[sz]||cfg.md;
  const svg=LOGOSVG.replace('HVAL',h);
  return`<div style="display:flex;align-items:center;gap:8px">${svg}<span style="font-weight:800;font-size:${fs}px;letter-spacing:-0.5px;color:#111">Build<span style="color:#F4B400">Match</span></span></div>`;
}

function ring(score){
  const r=22,c=2*Math.PI*r,d=(score/100)*c;
  const col=score>=90?'#16a34a':score>=75?'#F4B400':'#dc2626';
  return`<div style="position:relative;width:54px;height:54px;flex-shrink:0"><svg width="54" height="54" style="transform:rotate(-90deg)"><circle cx="27" cy="27" r="${r}" fill="none" stroke="#F3F4F6" stroke-width="5"/><circle cx="27" cy="27" r="${r}" fill="none" stroke="${col}" stroke-width="5" stroke-dasharray="${d} ${c}" stroke-linecap="round"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:${col}">${score}</div></div>`;
}

function pbar(pct,col='#F4B400',h=8){

}

// ================================================================
// FLOATING CHAT WIDGET
// ================================================================
function chatWidget(){
  const {chatOpen:open,chatTarget:tkey,chatMsgs,chatTyping:typing,chatUnread:unread,chatInput:ci}=S;
  const tgt=CHAT_TARGETS.find(x=>x.key===tkey);

  const fab=`<div style="position:fixed;bottom:24px;right:24px;z-index:9999">

  if(!open) return fab;

  const hdr=`<div style="background:#111;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
    ${tkey?`<button id="btn-chat-back" style="background:none;border:none;cursor:pointer;color:#F4B400;font-size:18px;padding:0;line-height:1;margin-right:2px">←</button>`:''}
    <div style="width:36px;height:36px;border-radius:50%;background:#F4B400;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0">${tkey?tgt.av:'💬'}</div>
    <div style="flex:1;min-width:0">
      <p style="font-weight:800;font-size:13px;color:#fff;margin:0">${tkey?tgt.label:'BuildMatch Chat'}</p>
      <p style="font-size:11px;color:#9CA3AF;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tkey?tgt.role:'Hubungi siapa hari ini?'}</p>
    </div>
    ${tkey?`<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:${tgt.online?'#22c55e':'#6B7280'}"></div><span style="font-size:11px;color:${tgt.online?'#22c55e':'#9CA3AF'}">${tgt.online?'Online':'Offline'}</span></div>`:''}
  </div>`;

  let body='';
  if(!tkey){
    body=`<div style="padding:16px;overflow-y:auto;flex:1">
      <p style="font-size:12px;color:#6B7280;margin:0 0 14px">Pilih pihak yang ingin Anda hubungi:</p>
      ${CHAT_TARGETS.map(ct=>{
        const mc=chatMsgs[ct.key]||[];
        const lt=mc.length>0?mc[mc.length-1].text:ct.role;
        return`<button data-ctgt="${ct.key}" class="btn-ctgt" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1.5px solid #E5E7EB;background:white;cursor:pointer;text-align:left;width:100%;margin-bottom:10px;transition:all .15s">
          <div style="width:42px;height:42px;border-radius:50%;background:#111;color:#F4B400;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;position:relative">${ct.av}<div style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:${ct.online?'#22c55e':'#9CA3AF'};border:1.5px solid white"></div></div>
          <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;justify-content:space-between;gap:6px"><span style="font-weight:700;font-size:13px;color:#111">${ct.label}</span><span style="font-size:10px;background:#F3F4F6;color:#6B7280;padding:2px 7px;border-radius:99px;flex-shrink:0">${ct.badge}</span></div>
          <p style="font-size:12px;color:#6B7280;margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lt.length>45?lt.slice(0,45)+'...':lt}</p></div>
          ${mc.length>0?`<div style="width:20px;height:20px;border-radius:50%;background:#F4B400;color:#111;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">${mc.length}</div>`:''}
        </button>`;
      }).join('')}
      <div style="background:#F9FAFB;border-radius:10px;padding:10px 12px;display:flex;gap:8px"><span>🔒</span><p style="font-size:11px;color:#6B7280;margin:0;line-height:1.5">Semua percakapan dienkripsi dan tersimpan aman di platform BuildMatch.</p></div>
    </div>`;
  } else {
    const welcome=msgs.length===0?`<div style="text-align:center;padding:16px 8px">
      <div style="width:52px;height:52px;border-radius:50%;background:#111;color:#F4B400;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;margin:0 auto 10px">${tgt.av}</div>
      <p style="font-weight:800;font-size:14px;color:#111;margin:0">${tgt.label}</p>
      <p style="font-size:12px;color:#6B7280;margin:4px 0 0;line-height:1.5">${tkey==='konsultan'?'Halo! Saya konsultan konstruksi BuildMatch. Ada yang bisa saya bantu?':tkey==='kontraktor'?'Selamat datang! Saya siap memberikan update progres proyek Anda.':'Halo! Kami siap melayani kebutuhan material bangunan Anda.'}</p>
    </div>`:'';
    const bubbles=msgs.map(m=>`<div style="display:flex;flex-direction:${m.from==='user'?'row-reverse':'row'};gap:8px;align-items:flex-end;margin-bottom:10px">
      ${m.from==='bot'?`<div style="width:28px;height:28px;border-radius:50%;background:#111;color:#F4B400;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0">${tgt.av}</div>`:''}
      <div style="max-width:78%"><div style="padding:9px 12px;border-radius:${m.from==='user'?'14px 14px 4px 14px':'14px 14px 14px 4px'};background:${m.from==='user'?'#F4B400':'#F3F4F6'};color:${m.from==='user'?'#111':'#374151'};font-size:13px;line-height:1.5">${esc(m.text)}</div>
      <p style="font-size:10px;color:#9CA3AF;margin:3px 0 0;text-align:${m.from==='user'?'right':'left'}">${m.time}</p></div>
    </div>`).join('');
    const dots=typing?`<div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:10px">
      <div style="width:28px;height:28px;border-radius:50%;background:#111;color:#F4B400;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900">${tgt.av}</div>
      <div style="background:#F3F4F6;padding:10px 14px;border-radius:14px 14px 14px 4px;display:flex;gap:4px;align-items:center"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>`:'';
    const qr=msgs.length===0&&!typing?`<div style="padding:0 14px 10px;flex-shrink:0">
      <p style="font-size:11px;color:#9CA3AF;font-weight:600;margin:0 0 6px">Pertanyaan cepat:</p>
      ${tgt.qr.map(q=>`<button data-qr="${esc(q)}" class="btn-qr" style="display:block;width:100%;padding:8px 12px;border-radius:10px;border:1.5px solid #E5E7EB;background:white;cursor:pointer;font-size:12px;font-weight:600;color:#374151;text-align:left;margin-bottom:6px">💬 ${q}</button>`).join('')}
    </div>`:'';
    body=`<div style="flex:1;overflow-y:auto;padding:14px 14px 8px" id="chat-area">${welcome}${bubbles}${dots}<div id="chat-end"></div></div>
      ${qr}
      <div style="padding:10px 14px 14px;border-top:1px solid #F3F4F6;flex-shrink:0">
        <div style="display:flex;gap:8px;align-items:flex-end">
          <textarea id="cinput" rows="1" placeholder="Tulis pesan ke ${esc(tgt.label)}..." style="flex:1;border:1.5px solid #E5E7EB;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;resize:none;max-height:80px;overflow-y:auto">${esc(ci)}</textarea>
          <button id="btn-csend" ${!ci.trim()||typing?'disabled':''} style="width:38px;height:38px;border-radius:10px;border:none;background:${ci.trim()&&!typing?'#F4B400':'#F3F4F6'};cursor:${ci.trim()&&!typing?'pointer':'not-allowed'};display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">➤</button>
        </div>
        <p style="font-size:10px;color:#9CA3AF;margin:6px 0 0;text-align:center">Enter untuk kirim · Shift+Enter baris baru</p>
      </div>`;
  }

  return fab+`<div class="chat-slide" style="position:fixed;bottom:92px;right:24px;z-index:9998;width:360px;max-width:calc(100vw - 32px);background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.18);border:1px solid #E5E7EB;display:flex;flex-direction:column;overflow:hidden;max-height:75vh">${hdr}${body}</div>`;
}

function sendChatMsg(txt){
  if(!txt||!txt.trim()||!S.chatTarget||S.chatTyping) return;
  const tgt=CHAT_TARGETS.find(x=>x.key===S.chatTarget);
  if(!tgt) return;
  const k=S.chatTarget;
  if(!S.chatMsgs[k]) S.chatMsgs[k]=[];
  S.chatMsgs[k].push({from:'user',text:txt.trim(),time:fmtT()});
  S.chatInput='';
  S.chatTyping=true;
  render();
  const rep=tgt.s[txt.trim()]||'Terima kasih pesannya! Tim kami akan segera merespons. Hotline: 0800-BUILD-ID.';
  setTimeout(()=>{
    if(!S.chatMsgs[k]) S.chatMsgs[k]=[];
    S.chatMsgs[k].push({from:'bot',text:rep,time:fmtT()});
    S.chatTyping=false;
    render();
    const a=document.getElementById('chat-area');
    if(a) a.scrollTop=a.scrollHeight;
  },1200);
}

function buildApp(){
  const u=S.user;
  if(!u) return authPage();
  if(u.role==='kontraktor'&&!u.isVerified) return kybPage();
  if(u.role==='supplier') return dashS();
  if(u.role==='kontraktor') return dashK();
  if(u.role==='admin') return dashAdmin();
  const STEPS=[step0,step1,step2,step3,step4,step5,step6,step7,step8];
  return`<div style="min-height:100vh;background:#F5F5F5;display:flex;flex-direction:column">
    ${topNav()}
    <div id="scont" style="flex:1;overflow-y:auto;padding-bottom:80px">${(STEPS[S.step]||step0)()}</div>
    ${chatWidget()}
  </div>`;
}

// Helper: update KYB next button validity without full render
function refreshKybBtn(step){
  if(step===1){
    const btn=document.getElementById('btn-k1');
    if(!btn) return;
    const ktp=(document.getElementById('k-ktp')||{}).value||'';
    const npwp=(document.getElementById('k-npwp')||{}).value||'';
    const valid=ktp.trim()&&npwp.trim()&&S.kybSelfie;
    btn.disabled=!valid;
    btn.style.background=valid?'#F4B400':'#E5E7EB';
    btn.style.color=valid?'#111':'#9CA3AF';
    btn.style.cursor=valid?'pointer':'not-allowed';
  } else if(step===2){
    const btn=document.getElementById('btn-k2');
    if(!btn) return;
    const u=(document.getElementById('k-usaha')||{}).value||'';
    const n=(document.getElementById('k-nib')||{}).value||'';
    const valid=u.trim()&&n.trim()&&S.kybSiujk;
    btn.disabled=!valid;
    btn.style.background=valid?'#F4B400':'#E5E7EB';
    btn.style.color=valid?'#111':'#9CA3AF';
    btn.style.cursor=valid?'pointer':'not-allowed';
  } else if(step===3){
    const btn=document.getElementById('btn-k3');
    if(!btn) return;
    const pn=(document.getElementById('k-pname')||{}).value||'';
    const pv=(document.getElementById('k-pval')||{}).value||'';
    const valid=pn.trim()&&pv.trim()&&S.kybFoto;
    btn.disabled=!valid;
    btn.style.background=valid?'#111':'#E5E7EB';
    btn.style.color=valid?'#F4B400':'#9CA3AF';
    btn.style.cursor=valid?'pointer':'not-allowed';
  }
}

// Helper: update step0 CTA button validity without full render
function refreshStep0Btn(){
  const btn=document.getElementById('btn-s0');
  if(!btn) return;
  const nama=(document.getElementById('p-nama')||{}).value||'';
  const budget=(document.getElementById('p-budget')||{}).value||'';
  const luas=(document.getElementById('p-luas')||{}).value||'';
  const valid=nama.trim()&&budget.trim()&&luas.trim();
  btn.disabled=!valid;
  btn.style.background=valid?'#F4B400':'#E5E7EB';
  btn.style.color=valid?'#111':'#9CA3AF';
  btn.style.cursor=valid?'pointer':'not-allowed';
}

function render(){
  document.getElementById('app').innerHTML=buildApp();
  bindEvents();
}

// ================================================================
// EVENT BINDING
// ================================================================
function bindEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
  const all=(sel,fn,ev='click')=>document.querySelectorAll(sel).forEach(el=>el.addEventListener(ev,fn));

  const RESET={user:null,step:0,project:{},contractor:{},escrowDone:false,escrowStage:'idle',cart:[],matTab:'Semen',logCount:3,stars:0,hoverStar:0,reviewText:'',reviewChecks:{waktu:false,kualitas:false,komunikasi:false,kebersihan:false},submitted:false,kTab:'proyek',kRepText:'',kPhotos:[],kPhotoData:{},kRepSent:false,kReps:[],sTab:'pesanan',adminTab:'overview',chatOpen:false,chatTarget:null,chatMsgs:{},chatInput:'',chatTyping:false,chatUnread:0};

  // ── AUTH ──
  on('tab-login','click',()=>mg({authTab:'login',authError:''}));
  on('tab-reg','click',()=>mg({authTab:'register',authError:''}));
  on('btn-eye','click',()=>set('authShowPass',!S.authShowPass));
  on('a-email','input',e=>{S.authEmail=e.target.value;});
  on('a-pass','input',e=>{S.authPass=e.target.value;});
  on('r-name','input',e=>{S.authName=e.target.value;});
  on('r-email','input',e=>{S.authEmail=e.target.value;});
  on('r-pass','input',e=>{S.authPass=e.target.value;});
  on('r-role','change',e=>{S.authRole=e.target.value;render();});
  on('btn-login','click',()=>{
    const f=S.accounts.find(a=>a.email.toLowerCase()===S.authEmail.trim().toLowerCase()&&a.password===S.authPass);
    if(!f){set('authError','Email atau password salah!');return;}
    mg({user:{email:f.email,name:f.name,role:f.role,isVerified:true},authError:'',adminTab:'overview'});
  });
  on('btn-register','click',()=>{
    const {authName:n,authEmail:e,authPass:p,authRole:r,accounts:ac}=S;
    if(!n.trim()||!e.trim()||!p.trim()){set('authError','Semua field wajib diisi.');return;}
    if(!/\S+@\S+\.\S+/.test(e)){set('authError','Format email tidak valid.');return;}
    if(p.length<3){set('authError','Password minimal 3 karakter.');return;}
    if(ac.find(a=>a.email.toLowerCase()===e.trim().toLowerCase())){set('authError','Email sudah terdaftar. Silakan masuk.');return;}
    const na={email:e.trim(),password:p,name:n.trim(),role:r};
    S.accounts.push(na);
    mg({user:{email:na.email,name:na.name,role:r,isVerified:r!=='kontraktor'},authError:''});
  });
  all('.dbtn',e=>{const b=e.currentTarget;mg({authEmail:b.dataset.de,authPass:b.dataset.dp});});

  // ── KYB ──
  on('k-ktp','input',e=>{S.kybKtp=e.target.value;refreshKybBtn(1);});
  on('k-npwp','input',e=>{S.kybNpwp=e.target.value;refreshKybBtn(1);});
  on('up-selfie','click',()=>{S.kybSelfie=!S.kybSelfie;render();});
  on('btn-k1','click',()=>{
    const ktp=document.getElementById('k-ktp'),npwp=document.getElementById('k-npwp');
    if(ktp) S.kybKtp=ktp.value;
    if(npwp) S.kybNpwp=npwp.value;
    if(S.kybKtp.trim()&&S.kybNpwp.trim()&&S.kybSelfie) set('kybStep',2);
  });
  on('k-usaha','input',e=>{S.kybUsaha=e.target.value;refreshKybBtn(2);});
  on('k-nib','input',e=>{S.kybNib=e.target.value;refreshKybBtn(2);});
  on('up-siujk','click',()=>{S.kybSiujk=!S.kybSiujk;render();});
  on('btn-k2b','click',()=>set('kybStep',1));
  on('btn-k2','click',()=>{
    const u=document.getElementById('k-usaha'),n=document.getElementById('k-nib');
    if(u) S.kybUsaha=u.value;
    if(n) S.kybNib=n.value;
    if(S.kybUsaha.trim()&&S.kybNib.trim()&&S.kybSiujk) set('kybStep',3);
  });
  on('k-pname','input',e=>{S.kybPName=e.target.value;refreshKybBtn(3);});
  on('k-pval','input',e=>{S.kybPVal=e.target.value;refreshKybBtn(3);});
  on('up-foto','click',()=>{S.kybFoto=!S.kybFoto;render();});
  on('btn-k3b','click',()=>set('kybStep',2));
  on('btn-k3','click',()=>{
    const pn=document.getElementById('k-pname'),pv=document.getElementById('k-pval');
    if(pn) S.kybPName=pn.value;
    if(pv) S.kybPVal=pv.value;
    if(S.kybPName.trim()&&S.kybPVal.trim()&&S.kybFoto) set('kybModal',true);
  });
  on('btn-kyb-done','click',()=>mg({kybModal:false,user:{...S.user,isVerified:true}}));

  // ── LOGOUT ──
  on('btn-logout','click',()=>mg(RESET));

  // ── NAV steps (konsumen) ──
  all('[data-gs]',e=>{const i=parseInt(e.currentTarget.dataset.gs);if(i<S.step)set('step',i);});

  // ── STEP 0 ──
  // Fix: text inputs only update state, NO render() — prevents focus loss on every keystroke
  on('p-nama','input',e=>{S.project.nama=e.target.value;refreshStep0Btn();});
  on('p-budget','input',e=>{S.project.budget=e.target.value;refreshStep0Btn();});
  on('p-luas','input',e=>{S.project.luas=e.target.value;refreshStep0Btn();});
  on('p-waktu','input',e=>{S.project.waktu=e.target.value;});
  on('p-lokasi','change',e=>{S.project.lokasi=e.target.value;});
  on('p-jenis','change',e=>{S.project.jenis=e.target.value;});
  on('btn-s0','click',()=>{
    // Read live values from DOM before navigating
    const nama=$('p-nama'),budget=$('p-budget'),luas=$('p-luas');
    if(nama) S.project.nama=nama.value;
    if(budget) S.project.budget=budget.value;
    if(luas) S.project.luas=luas.value;
    const pw=$('p-waktu'); if(pw) S.project.waktu=pw.value;
    const pl=$('p-lokasi'); if(pl) S.project.lokasi=pl.value;
    const pj=$('p-jenis'); if(pj) S.project.jenis=pj.value;
    if((S.project.nama||'').trim()&&(S.project.budget||'').trim()&&(S.project.luas||'').trim())
      set('step',1);
  });

  // ── STEP 1 ──
  all('.btn-pick',e=>{const c=CONTRACTORS.find(x=>x.id===parseInt(e.currentTarget.dataset.cid));if(c)mg({contractor:c,step:2});});

  // ── STEP 2 ──
  on('btn-s2','click',()=>set('step',3));

  // ── STEP 3 ──
  on('btn-escrow-lock','click',()=>set('escrowDone',true));
  on('btn-s3','click',()=>set('step',4));

  // ── STEP 4 ──
  all('.btn-mt',e=>set('matTab',e.currentTarget.dataset.mt));
  all('.btn-cart',e=>{const n=e.currentTarget.dataset.cn;set('cart',S.cart.includes(n)?S.cart.filter(x=>x!==n):[...S.cart,n]);});
  on('btn-s4','click',()=>set('step',5));

  // ── STEP 5 ──
  on('btn-loadmore','click',()=>set('logCount',LOGS.length));
  on('btn-s5','click',()=>set('step',6));

  // ── STEP 6 ──
  on('btn-s6','click',()=>set('step',7));

  // ── STEP 7 ──
  on('btn-approve','click',()=>set('escrowStage','confirming'));
  on('btn-cancel','click',()=>set('escrowStage','idle'));
  on('btn-yes','click',()=>set('escrowStage','released'));
  on('btn-s7','click',()=>set('step',8));

  // ── STEP 8 ──
  // Fix: hover updates DOM directly without render() — no full rebuild on mouse move
  const sr=$('star-row');
  if(sr){
    const stars=sr.querySelectorAll('.star');
    function paintStars(hov){
      stars.forEach(s=>{
        const n=parseInt(s.dataset.sn);
        const lit=(hov||S.stars)>=n;
        s.style.color=lit?'#F4B400':'#E5E7EB';
        s.style.transform=lit?'scale(1.2)':'scale(1)';
      });
    }
    stars.forEach(s=>{
      s.addEventListener('mouseenter',()=>{S.hoverStar=parseInt(s.dataset.sn);paintStars(S.hoverStar);});
      s.addEventListener('mouseleave',()=>{S.hoverStar=0;paintStars(0);});
      s.addEventListener('click',()=>{
        S.stars=parseInt(s.dataset.sn);
        S.hoverStar=0;
        // Only re-render to update label text & submit button state — stars already painted
        const lbl=document.getElementById('star-label');
        const RLBL=['','Sangat Buruk 😞','Buruk 😕','Cukup 😊','Bagus 😄','Luar Biasa! 🌟'];
        if(lbl) lbl.textContent=RLBL[S.stars];
        const sub=$('btn-submit');
        if(sub){sub.disabled=false;sub.style.background='#F4B400';sub.style.color='#111';sub.style.cursor='pointer';sub.textContent='📤 Kirim Ulasan & Selesaikan Proyek';}
        // Update trust score display
        const tsi=document.getElementById('trust-score-impact');
        if(tsi){
          const c=S.contractor;
          const ns=Math.min(100,c.score+(S.stars>=4?1:S.stars>0&&S.stars<=2?-1:0));
          const col=ns>c.score?'#16a34a':ns<c.score?'#DC2626':'#111';
          tsi.innerHTML=`${c.score}/100 → <strong style="color:${col}">${ns}/100</strong> ${ns>c.score?'📈 Naik':ns<c.score?'📉 Turun':'→ Tetap'}`;
        }
      });
    });
  }
  all('.chk',e=>{const k=e.currentTarget.dataset.ck;S.reviewChecks[k]=!S.reviewChecks[k];render();});
  on('rtxt','input',e=>{S.reviewText=e.target.value;});
  on('btn-submit','click',()=>{if(S.stars>0)set('submitted',true);});
  on('btn-restart','click',()=>mg({step:0,project:{},contractor:{},escrowDone:false,escrowStage:'idle',cart:[],logCount:3,stars:0,hoverStar:0,reviewText:'',reviewChecks:{waktu:false,kualitas:false,komunikasi:false,kebersihan:false},submitted:false}));

  // ── KONTRAKTOR DASH ──
  all('.kttab',e=>set('kTab',e.currentTarget.dataset.kt));
  on('krep','input',e=>{S.kRepText=e.target.value;// no render — prevent focus loss
    const btn=document.getElementById('btn-ksend');if(btn){btn.disabled=!e.target.value.trim();btn.style.background=e.target.value.trim()?'#F4B400':'#E5E7EB';btn.style.color=e.target.value.trim()?'#111':'#9CA3AF';btn.style.cursor=e.target.value.trim()?'pointer':'not-allowed';}});
  // Real file upload with FileReader preview
  document.querySelectorAll('.kph-file-input').forEach(inp=>{
    inp.addEventListener('change',function(e){
      const idx=parseInt(this.dataset.idx);
      const file=e.target.files[0];
      if(!file||S.kRepSent) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        if(!S.kPhotoData) S.kPhotoData={};
        S.kPhotoData[idx]=ev.target.result;
        S.kPhotos=[...new Set([...S.kPhotos,idx])];
        // Update preview in-place without full render
        const lbl=document.querySelector(`label[for="kph-file-${idx}"]`);
        if(lbl){
          lbl.style.borderColor='#16a34a';
          lbl.style.background='#F0FDF4';
          lbl.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:8px"><div style="position:absolute;top:3px;right:3px;background:#16a34a;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:white">✓</div>`;
        }
        // Update count display
        const cnt=document.getElementById('photo-count-display');
        const total=Object.keys(S.kPhotoData||{}).length;
        if(cnt) cnt.innerHTML=`📎 ${total} foto berhasil diunggah`;
        else{
          const wrap=document.getElementById('photo-count-wrap');
          if(wrap&&total>0&&!document.getElementById('photo-count-display')){
            const p=document.createElement('p');
            p.id='photo-count-display';
            p.style.cssText='font-size:12px;color:#16a34a;margin:6px 0 0';
            p.innerHTML=`📎 ${total} foto berhasil diunggah`;
            wrap.appendChild(p);
          }
        }
        // Update send button
        const btn=document.getElementById('btn-ksend');
        if(btn) btn.textContent=`📤 Kirim Laporan (${total} Foto)`;
      };
      reader.readAsDataURL(file);
    });
  });
  on('btn-ksend','click',()=>{
    if(S.kRepText.trim()){
      S.kReps.push({text:S.kRepText,time:fmtT(),photos:Object.keys(S.kPhotoData||{}).length});
      mg({kRepSent:true});
    }
  });
  on('btn-knew','click',()=>mg({kRepSent:false,kRepText:'',kPhotos:[],kPhotoData:{}}));

  // ── ADMIN DASH ──
  all('.adtab',e=>set('adminTab',e.currentTarget.dataset.at));
  all('.btn-kyb-action',e=>{
    const btn=e.currentTarget;
    const isApprove=btn.dataset.kybApprove!==undefined;
    const id=isApprove?btn.dataset.kybApprove:btn.dataset.kybReject;
    // Visual feedback only (mock)
    const card=btn.closest('div[style*="border-radius:14px"]');
    if(card){
      const statusDiv=document.createElement('div');
      statusDiv.style.cssText=`background:${isApprove?'#F0FDF4':'#FEF2F2'};border-radius:10px;padding:10px 12px;text-align:center;font-size:13px;font-weight:600;color:${isApprove?'#166534':'#DC2626'}`;
      statusDiv.textContent=isApprove?'✅ Sudah Disetujui — Kontraktor Aktif di Marketplace':'❌ Pengajuan Ditolak — Kontraktor Diminta Revisi Dokumen';
      btn.parentElement.replaceWith(statusDiv);
    }
  });
  all('.btn-freeze',e=>{
    const id=e.currentTarget.dataset.freezeId;
    const btn=e.currentTarget;
    btn.style.background='#F3F4F6';btn.style.color='#6B7280';btn.disabled=true;
    btn.textContent='✅ Akun sudah dibekukan — tidak dapat login';
    const card=btn.closest('div[style*="border-radius:14px"]');
    if(card){
      // Add frozen badge
      const badgeWrap=card.querySelector('div[style*="flex-wrap:wrap"]');
      if(badgeWrap){
        const frozenBadge=document.createElement('span');
        frozenBadge.style.cssText='background:#F3F4F6;color:#6B7280;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700';
        frozenBadge.textContent='❄️ Akun Dibekukan';
        badgeWrap.appendChild(frozenBadge);
      }
    }
  });
  all('.btn-release',e=>{
    const btn=e.currentTarget;
    btn.style.background='#DCFCE7';btn.style.color='#166534';btn.disabled=true;
    btn.textContent='✅ Dana sudah dicairkan ke rekening kontraktor';
  });

  // ── SUPPLIER DASH ──
  all('.sttab',e=>set('sTab',e.currentTarget.dataset.st));
  all('.delact',e=>{
    const id=parseInt(e.currentTarget.dataset.did);
    if(!S.deliveries) S.deliveries=JSON.parse(JSON.stringify(INIT_DEL));
    S.deliveries=S.deliveries.map(d=>{
      if(d.id!==id) return d;
      const ns=DFLOW[d.status]||d.status;
      return{...d,status:ns,next:DNEXT[ns]};
    });
    render();
  });

  // ── CHAT ──
  on('btn-chat-fab','click',()=>{S.chatOpen=!S.chatOpen;if(S.chatOpen)S.chatUnread=0;render();});
  on('btn-chat-back','click',()=>mg({chatTarget:null,chatTyping:false}));
  all('.btn-ctgt',e=>set('chatTarget',e.currentTarget.dataset.ctgt));
  all('.btn-qr',e=>sendChatMsg(e.currentTarget.dataset.qr));
  on('cinput','input',e=>{S.chatInput=e.target.value;});
  on('cinput','keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMsg(S.chatInput);}});
  on('btn-csend','click',()=>sendChatMsg(S.chatInput));

  // auto-scroll chat + step container
  const ca=$('chat-area');
  if(ca) ca.scrollTop=ca.scrollHeight;
  const sc=$('scont');
  if(sc) sc.scrollTop=0;
}

render();
</script>
</body>
</html>
